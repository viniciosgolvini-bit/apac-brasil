<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APAC - Advanced Predictive Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 bg-slate-800 p-8 rounded-2xl border border-slate-700 h-fit shadow-2xl">
            <h1 class="text-3xl font-black italic text-emerald-400 mb-8 tracking-tighter uppercase">APAC <span class="text-white font-light text-xs">Brasil v1.0</span></h1>
            <div class="space-y-4">
                <input id="origem" type="text" placeholder="Origem (Ex: Santos, SP)" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-sm focus:border-emerald-500 outline-none">
                <input id="destino" type="text" placeholder="Destino (Ex: Porto Alegre, RS)" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-sm focus:border-emerald-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="kml" type="number" value="2.5" step="0.1" title="KM/L" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                    <input id="preco" type="number" value="6.15" step="0.01" title="Preço Diesel" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                </div>
                <button onclick="calcularReal()" id="btn" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 font-black rounded-2xl transition shadow-xl uppercase tracking-widest text-sm">Diagnosticar Brasil</button>
            </div>
        </div>

        <div id="relatorio-area" class="lg:col-span-8 bg-slate-800 p-8 rounded-2xl border border-emerald-500/20 hidden shadow-2xl">
            <div id="pdf-content">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <h2 class="text-xl font-black italic uppercase">Laudo Técnico <span class="text-emerald-500">APAC</span></h2>
                    <span id="res-dist" class="text-xs text-slate-400 font-bold bg-slate-900 px-3 py-1 rounded"></span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                    <div class="md:col-span-5 text-center flex flex-col items-center">
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Perda Potencial</p>
                        <h3 id="res-porcentagem" class="text-5xl font-black text-emerald-400">0%</h3>
                        <div class="w-full h-44 mt-4">
                            <canvas id="graficoPizza"></canvas>
                        </div>
                    </div>
                    <div class="md:col-span-7 space-y-4">
                        <div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20 text-center shadow-inner">
                            <p class="text-[9px] text-red-400 uppercase font-bold">Prejuízo Financeiro Estimado</p>
                            <h4 id="res-prejuizo" class="text-4xl font-black text-red-500">R$ 0,00</h4>
                        </div>
                        <div class="text-[11px] space-y-2 text-slate-400 bg-slate-900 p-4 rounded-xl border border-slate-700">
                            <div class="flex justify-between border-b border-slate-700 pb-2"><span>Litros Consumidos (Real):</span> <span id="res-real" class="text-white font-bold text-lg"></span></div>
                            <div class="flex justify-between"><span>Litros Necessários (Ideal):</span> <span id="res-ideal" class="text-emerald-400 font-bold text-lg"></span></div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 p-6 bg-slate-900 rounded-3xl border-2 border-emerald-500/30">
                    <div id="mapa-interativo" class="w-full h-64 rounded-2xl mb-6 bg-slate-800 border border-slate-700"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <p class="text-[10px] text-red-400 font-black uppercase mb-1">Ponto Crítico:</p>
                            <p id="res-vilao" class="text-sm font-bold text-white uppercase italic"></p>
                        </div>
                        <div>
                            <p class="text-[10px] text-emerald-400 font-black uppercase mb-1">Solução Recomendada:</p>
                            <p id="res-desvio" class="text-sm text-slate-300 leading-snug"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mt-10">
                <button onclick="gerarPDF()" class="py-4 bg-slate-700 hover:bg-slate-600 rounded-xl text-[10px] font-bold uppercase tracking-widest transition">Baixar PDF</button>
                <div class="bg-emerald-500/10 p-2 rounded-xl text-center flex flex-col items-center justify-center border border-emerald-500/20">
                    <p class="text-[8px] text-slate-500 uppercase">Lucro Recuperável</p>
                    <p id="sol-lucro" class="text-lg font-black text-emerald-400">R$ 0,00</p>
                </div>
                <a id="btn-whatsapp" href="#" target="_blank" class="py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-[10px] font-bold uppercase tracking-widest transition text-center flex items-center justify-center">Consultoria Ativa</a>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let map = null;

        async function calcularReal() {
            const btn = document.getElementById('btn');
            btn.innerText = "CONECTANDO SATÉLITE...";
            btn.disabled = true;
            const precoDiesel = parseFloat(document.getElementById('preco').value);

            try {
                // Se for hospedar na internet, troque '127.0.0.1' pelo link do seu servidor (ex: sua-api.render.com)
                const response = await fetch('http://127.0.0.1:8000/calcular-real', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        origem: document.getElementById('origem').value,
                        destino: document.getElementById('destino').value,
                        consumo_kml: parseFloat(document.getElementById('kml').value)
                    })
                });

                if(!response.ok) throw new Error();
                const data = await response.json();
                
                document.getElementById('relatorio-area').classList.remove('hidden');
                document.getElementById('res-porcentagem').innerText = data.resultado.economia_perc;
                document.getElementById('res-dist').innerText = data.distancia + " KM ANALISADOS";
                document.getElementById('res-real').innerText = data.resultado.total_L + " L";
                document.getElementById('res-ideal').innerText = data.resultado.ideal_L + " L";

                const prejuizo = (data.resultado.total_L - data.resultado.ideal_L) * precoDiesel;
                document.getElementById('res-prejuizo').innerText = "R$ " + prejuizo.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                const lucroRecuperado = data.reajuste.economia_L * precoDiesel;
                document.getElementById('sol-lucro').innerText = "R$ " + lucroRecuperado.toLocaleString('pt-BR', {minimumFractionDigits: 2});

                document.getElementById('res-vilao').innerText = data.diagnostico_infra.local_vilao;
                document.getElementById('res-desvio').innerText = data.diagnostico_infra.rota_desvio;

                // Mapa Interativo
                if (map) map.remove();
                map = L.map('mapa-interativo').setView([data.diagnostico_infra.lat_o, data.diagnostico_infra.lon_o], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([data.diagnostico_infra.lat_o, data.diagnostico_infra.lon_o]).addTo(map).bindPopup("Origem");
                L.marker([data.diagnostico_infra.lat_d, data.diagnostico_infra.lon_d]).addTo(map).bindPopup("Destino");

                // Gráfico
                const ctx = document.getElementById('graficoPizza').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Ideal', 'Desperdício'],
                        datasets: [{
                            data: [data.resultado.ideal_L, data.resultado.total_L - data.resultado.ideal_L],
                            backgroundColor: ['#10b981', '#ef4444'],
                            borderWidth: 0, cutout: '70%'
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });

                const msg = encodeURIComponent(`Análise APAC Brasil: Vi um desperdício de R$ ${prejuizo.toFixed(2)} na rota de ${data.distancia}km. Preciso da reengenharia.`);
                document.getElementById('btn-whatsapp').href = `https://wa.me/5551984242944?text=${msg}`;

            } catch (error) {
                alert("ERRO DE CONEXÃO: Certifique-se de que o Python (main.py) está ligado no terminal.");
            } finally {
                btn.innerText = "Diagnosticar Brasil";
                btn.disabled = false;
            }
        }

        function gerarPDF() {
            const element = document.getElementById('pdf-content');
            html2pdf().set({
                margin: 0.5, filename: 'Laudo_APAC_Brasil.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, backgroundColor: '#1e293b' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).from(element).save();
        }
    </script>
</body>
</html>
