<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APAC - Advanced Predictive Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
       
        <div class="lg:col-span-4 bg-slate-800 p-8 rounded-2xl border border-slate-700 h-fit">
            <h1 class="text-3xl font-black italic text-emerald-400 mb-8 tracking-tighter">APAC <span class="text-white font-light text-xs">RS v1.0</span></h1>
            <div class="space-y-4">
                <input id="origem" type="text" placeholder="Origem (Ex: Porto Seco, Porto Alegre)" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                <input id="destino" type="text" placeholder="Destino (Ex: Campo Bom, RS)" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input id="kml" type="number" value="5.5" step="0.1" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                    <input id="preco" type="number" value="6.15" step="0.01" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                </div>
                <button onclick="calcularReal()" id="btn" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 font-black rounded-2xl transition shadow-xl uppercase tracking-widest text-sm">Diagnosticar Rota GPS</button>
            </div>
        </div>


        <div id="relatorio-area" class="lg:col-span-8 bg-slate-800 p-8 rounded-2xl border border-emerald-500/20 hidden shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                <h2 class="text-xl font-black italic">DIAGNÓSTICO <span class="text-emerald-500 underline">APAC</span></h2>
                <span id="res-dist" class="text-xs text-slate-400 font-bold bg-slate-900 px-3 py-1 rounded"></span>
            </div>


            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                <div class="md:col-span-5 text-center flex flex-col items-center">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Perda Potencial</p>
                    <h3 id="res-porcentagem" class="text-5xl font-black text-emerald-400">0%</h3>
                    <div class="w-full h-44 mt-4">
                        <canvas id="graficoPizza"></canvas>
                    </div>
                </div>
                <div class="md:col-span-7 space-y-4">
                    <div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20 text-center shadow-inner">
                        <p class="text-[9px] text-red-400 uppercase font-bold">Prejuízo Financeiro na Rota</p>
                        <h4 id="res-prejuizo" class="text-4xl font-black text-red-500">R$ 0,00</h4>
                    </div>
                    <div class="text-[11px] space-y-2 text-slate-400 bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <div class="flex justify-between border-b border-slate-700 pb-2"><span>Consumo Real:</span> <span id="res-real" class="text-white font-bold text-lg"></span></div>
                        <div class="flex justify-between"><span>Consumo Ideal:</span> <span id="res-ideal" class="text-emerald-400 font-bold text-lg"></span></div>
                    </div>
                </div>
            </div>


            <div class="mt-8 p-6 bg-slate-900 rounded-3xl border-2 border-emerald-500/50 shadow-[0_0_25px_rgba(16,185,129,0.1)]">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-emerald-500 rounded-lg animate-pulse">
                        <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 20l-5.447-2.724A2 2 0 013 15.382V6.618a2 2 0 011.106-1.789L9 2l5 2.5L20 2l1 1v12l-6 3-5-2.5z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-black text-white italic leading-tight">REENGENHARIA DE ROTA APAC</h3>
                        <p class="text-[9px] text-slate-500 uppercase font-bold tracking-[0.2em]">Diagnóstico de Infraestrutura do Percurso</p>
                    </div>
                </div>


                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                    <div class="md:col-span-6 bg-slate-800 p-1 rounded-2xl border border-slate-700 shadow-md">
                        <img id="res-mapa" src="" alt="Mapa de Reengenharia de Rota" class="w-full h-auto rounded-xl">
                    </div>
                    <div class="md:col-span-6 space-y-6">
                        <div>
                            <p class="text-[10px] text-red-400 font-black uppercase mb-1">Ponto Crítico Identificado:</p>
                            <p id="res-vilao" class="text-sm font-bold text-white uppercase tracking-tight italic"></p>
                        </div>
                        <div>
                            <p class="text-[10px] text-emerald-400 font-black uppercase mb-1 leading-none">Solução de Desvio (<span id="res-impacto"></span>):</p>
                            <p id="res-desvio" class="text-sm font-medium text-slate-300 leading-snug"></p>
                        </div>
                    </div>
                </div>
            </div>


            <div class="grid grid-cols-3 gap-4 mt-10">
                <button onclick="gerarPDF()" class="py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-[10px] font-bold uppercase tracking-widest transition">PDF do Laudo</button>
                <div class="bg-emerald-500/10 p-2 rounded-xl text-center flex flex-col items-center justify-center border border-emerald-500/20">
                    <p class="text-[8px] text-slate-500 uppercase">Lucro Recuperado</p>
                    <p id="sol-lucro" class="text-lg font-black text-emerald-400">R$ 0,00</p>
                </div>
                <a id="btn-whatsapp" href="#" target="_blank" class="py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-[10px] font-bold uppercase tracking-widest transition text-center flex items-center justify-center">Falar com Consultor</a>
            </div>
        </div>
    </div>


    <script>
        let chartInstance = null;


        async function calcularReal() {
            const btn = document.getElementById('btn');
            btn.innerText = "LOCALIZANDO Gargalos...";
            btn.disabled = true;
            const precoDiesel = parseFloat(document.getElementById('preco').value);


            try {
                const response = await fetch('https://apac-brasil.onrender.com/calcular-real', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        origem: document.getElementById('origem').value,
                        destino: document.getElementById('destino').value,
                        consumo_kml: parseFloat(document.getElementById('kml').value),
                        peso_kg: 35000
                    })
                });


                const data = await response.json();
                document.getElementById('relatorio-area').classList.remove('hidden');
               
                // Preencher Resultados
                document.getElementById('res-porcentagem').innerText = data.resultado.economia_perc;
                document.getElementById('res-dist').innerText = data.distancia + " km de percurso real";
                document.getElementById('res-real').innerText = data.resultado.total_L + " L";
                document.getElementById('res-ideal').innerText = data.resultado.ideal_L + " L";


                // Cálculo Financeiro e Solução
                const prejuizo = (data.resultado.total_L - data.resultado.ideal_L) * precoDiesel;
                document.getElementById('res-prejuizo').innerText = "R$ " + prejuizo.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                const lucroRecuperado = data.reajuste.economia_L * precoDiesel;
                document.getElementById('sol-lucro').innerText = "R$ " + lucroRecuperado.toLocaleString('pt-BR', {minimumFractionDigits: 2});


                // Diagnóstico Visual (REENGENHARIA)
                document.getElementById('res-vilao').innerText = data.diagnostico_infra.local_vilao;
                document.getElementById('res-desvio').innerText = data.diagnostico_infra.rota_desvio;
                document.getElementById('res-impacto').innerText = data.diagnostico_infra.impacto_desvio;
                document.getElementById('res-mapa').src = data.diagnostico_infra.mapa_url;


                // Gráfico
                const ctx = document.getElementById('graficoPizza').getContext('2d');
                if (chartInstance) { chartInstance.destroy(); }
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Ideal', 'Marcha Lenta', 'Paradas'],
                        datasets: [{
                            data: [data.resultado.ideal_L, 10, 15], // Valores simulados para o gráfico
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                            borderWidth: 0, cutout: '75%'
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });


                const msg = encodeURIComponent(`Olá Vinicios! Analisei a rota e vi um desperdício de R$ ${prejuizo.toFixed(2)}. Quero aplicar a reengenharia de rota da APAC.`);
                document.getElementById('btn-whatsapp').href = `https://wa.me/5551999999999?text=${msg}`;


            } catch (error) {
                alert("O servidor de mapas demorou. Tente novamente.");
            } finally {
                btn.innerText = "Diagnosticar Rota GPS";
                btn.disabled = false;
            }
        }


        function gerarPDF() {
            const element = document.getElementById('relatorio-area');
            html2pdf().set({
                margin: 0.5, filename: 'Laudo_APAC.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, backgroundColor: '#1e293b' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
            }).from(element).save();
        }
    </script>
</body>
</html>
